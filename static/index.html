<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRONGRID AI — Premium Gym Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IRONGRID AI — Your virtual front desk assistant for membership, equipment, timings, trainers, and everything about the gym.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%23111215'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-family='Arial' font-size='34' fill='%23C6F135'%3EIG%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app" id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="brand-row">
      <div class="brand">
        IRON<span>GRID</span>
        <span class="brand-badge">AI</span>
      </div>
      <div id="statusBadge" class="status-badge open">
        <span class="status-dot"></span>
        OPEN NOW
      </div>
    </div>
    <div class="tagline">Virtual Front Desk · Membership · Facilities · Equipment</div>
  </header>

  <!-- QUICK CHIPS -->
  <nav class="chips" aria-label="Quick questions">
    <button class="chip" data-msg="What membership plans do you offer and how much do they cost?">Membership Plans</button>
    <button class="chip" data-msg="What equipment do you have for strength training?">Equipment</button>
    <button class="chip" data-msg="What are the gym timings?">Timings</button>
    <button class="chip" data-msg="Tell me about your trainers and personal training options.">Trainers</button>
    <button class="chip" data-msg="What group classes do you offer and what's the schedule?">Classes</button>
    <button class="chip" data-msg="What safety and hygiene measures does the gym follow?">Safety</button>
    <button class="chip" data-msg="What facilities and amenities are available?">Facilities</button>
    <button class="chip" data-msg="Do you have a free trial for new members?">Free Trial</button>
  </nav>

  <!-- MESSAGES -->
  <main class="messages" id="messages" role="log" aria-live="polite"></main>

  <!-- INPUT -->
  <div class="input-bar">
    <input
      id="userInput"
      type="text"
      placeholder="Ask about plans, equipment, timings, trainers…"
      autocomplete="off"
      aria-label="Type your message"
    >
    <button class="send-btn" id="sendBtn" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round">
        <path d="M22 2L11 13"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
      </svg>
    </button>
  </div>

  <div class="disclaimer">
    <div class="powered"><span class="rag-dot"></span> Powered by RAG · Retrieval Augmented Generation</div>
    Prototype assistant for demo purposes · Not a real gym
  </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
